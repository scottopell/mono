<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of Erosion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #root {
            width: 100%;
            height: 80vh;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border: 2px solid #ecf0f1;
            background: #ecf0f1;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            image-rendering: pixelated;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            z-index: 10;
        }

        .card-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 8px;
            background: white;
            color: #2c3e50;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }

        .card.forced {
            border: 3px solid #e74c3c;
            background: #fadbd8;
        }

        .card.optional {
            border: 3px solid #3498db;
            background: #d6eaf8;
        }

        button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #229954;
        }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="root">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="ui-overlay">
        <div id="turnInfo">Turn: 0</div>
        <div id="score">Score: 0</div>
    </div>

    <div class="card-display">
        <div id="forcedCard" class="card forced">Forced Card</div>
        <div id="optionalCard" class="card optional">Optional Card</div>
        <button id="skipButton">Skip Optional</button>
    </div>

    <script type="module" src="./dist/ui.js"></script>
</body>
</html>
