<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <title>Planet Game — MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Planet</h1>
      <p class="tagline">You are the planet. Tap is being rewritten — events arrive in the next phase.</p>
    </header>

    <section class="stage" role="button" aria-label="Planet surface">
      <canvas id="planet" aria-label="your surface, seen from above"></canvas>
    </section>

    <p id="tap-hint" class="tap-hint" aria-live="polite">gathering will… 0%</p>

    <section class="hud">
      <div class="gauge">
        <label>Stability <span class="gauge-desc">— how settled you feel. 100 ends the epoch</span><span id="stability-val">50</span></label>
        <div class="bar bar-stability"><div id="stability-fill"></div><div class="goal-mark" title="era threshold"></div></div>
      </div>
      <div class="gauge">
        <label>Will <span class="gauge-desc">— your capacity to act. 10 per deliberate release</span><span id="influence-val">0</span></label>
        <div class="bar bar-influence"><div id="influence-fill"></div></div>
      </div>
      <div class="meta">
        <span>Epoch <strong id="epoch">I</strong></span>
        <span>Age <strong id="age">0</strong></span>
        <span>Faults <strong id="fault-count">0</strong></span>
      </div>
    </section>

    <section class="controls">
      <button id="pause-btn" aria-label="Pause or resume time">Pause</button>
    </section>

    <details class="log-details">
      <summary>Geological record <span class="log-count" id="log-count"></span></summary>
      <ol id="log" aria-live="polite"></ol>
    </details>

    <footer>
      <details class="help-details">
        <summary>How it works</summary>
        <div class="help-grid">
          <p class="help-hint">Help is being rewritten for the new event-driven design.</p>
        </div>
      </details>
    </footer>
  </main>

  <script src="game.js"></script>
  <script src="harness.js"></script>
</body>
</html>
