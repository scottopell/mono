name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build sites
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import os
          import subprocess

          with open('.github/pages.yml', 'r') as f:
              config = yaml.safe_load(f)

          sites = config.get('sites', [])

          for site in sites:
              name = site['name']
              path = site['path']
              build_commands = site.get('build', [])

              if build_commands:
                  print(f"Building {name}...")
                  for cmd in build_commands:
                      print(f"  Running: {cmd}")
                      result = subprocess.run(cmd, shell=True, cwd=path, capture_output=True, text=True)
                      if result.returncode != 0:
                          print(f"Error building {name}:")
                          print(result.stderr)
                          exit(1)
                      print(result.stdout)
                  print(f"✓ Built {name}")
              else:
                  print(f"No build needed for {name}")
          PYTHON_SCRIPT

      - name: Copy static sites
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import os
          import shutil

          with open('.github/pages.yml', 'r') as f:
              config = yaml.safe_load(f)

          os.makedirs('_site', exist_ok=True)

          sites = config.get('sites', [])
          print(f"Found {len(sites)} sites to deploy")

          for site in sites:
              name = site['name']
              path = site['path']
              desc = site.get('description', '')

              print(f"Processing: {name}")

              if not os.path.isdir(path):
                  print(f"Warning: {path} not found, skipping")
                  continue

              # Copy static files
              dest = f"_site/{name}"
              if os.path.exists(dest):
                  shutil.rmtree(dest)
              shutil.copytree(path, dest)
              print(f"✓ Copied static site: {name}")
          PYTHON_SCRIPT

      - name: Inject build metadata
        # Substitute __DEPLOY_SHA__ placeholders in any HTML file under
        # _site/ with the current commit sha. Sites that don't use the
        # placeholder are unaffected.
        run: |
          find _site -name '*.html' -type f -print0 \
            | xargs -0 sed -i "s|__DEPLOY_SHA__|${{ github.sha }}|g"

      - name: Generate index page
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import os

          with open('.github/pages.yml', 'r') as f:
              config = yaml.safe_load(f)

          title = config.get('index', {}).get('title', 'My Projects')
          description = config.get('index', {}).get('description', '')
          sites = config.get('sites', [])
          repo_name = os.environ.get('REPO_NAME', '')
          repo_url = os.environ.get('REPO_URL', '')

          # GitHub icon SVG
          github_icon = '''<svg class="github-icon" viewBox="0 0 16 16" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
          </svg>'''

          html = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{title}</title>
            <style>
              body {{
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 800px;
                margin: 50px auto;
                padding: 20px;
                line-height: 1.6;
              }}
              .header {{
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 10px;
              }}
              h1 {{
                color: #333;
                margin: 0;
              }}
              .repo-link {{
                display: inline-flex;
                align-items: center;
                gap: 5px;
                color: #586069;
                text-decoration: none;
                padding: 5px 10px;
                border-radius: 5px;
                transition: background-color 0.2s;
              }}
              .repo-link:hover {{
                background-color: #f6f8fa;
              }}
              .github-icon {{
                vertical-align: middle;
              }}
              .description {{ color: #666; margin-bottom: 30px; }}
              .projects {{ list-style: none; padding: 0; }}
              .projects li {{
                margin: 15px 0;
                padding: 15px;
                border: 1px solid #ddd;
                border-radius: 5px;
              }}
              .project-header {{
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 5px;
              }}
              .project-link {{
                font-size: 1.2em;
                color: #0366d6;
                text-decoration: none;
              }}
              .project-link:hover {{ text-decoration: underline; }}
              .project-github {{
                display: inline-flex;
                align-items: center;
                gap: 3px;
                color: #586069;
                text-decoration: none;
                font-size: 0.9em;
                padding: 3px 8px;
                border-radius: 3px;
                transition: background-color 0.2s;
              }}
              .project-github:hover {{
                background-color: #f6f8fa;
              }}
              .project-desc {{ color: #666; }}
            </style>
          </head>
          <body>
            <div class="header">
              <h1>{title}</h1>
              <a href="{repo_url}" class="repo-link" target="_blank" rel="noopener">
                {github_icon}
                <span>View Repository</span>
              </a>
            </div>
            <p class="description">{description}</p>
            <ul class="projects">
          '''

          for site in sites:
              name = site['name']
              path = site['path']
              desc = site.get('description', '')
              source_url = f"{repo_url}/tree/main/{path}"

              html += f'''      <li>
                <div class="project-header">
                  <a href="/{repo_name}/{name}/" class="project-link">{name}</a>
                  <a href="{source_url}" class="project-github" target="_blank" rel="noopener">
                    {github_icon}
                    <span>Source</span>
                  </a>
                </div>
                <div class="project-desc">{desc}</div>
              </li>
          '''

          html += '''    </ul>
          </body>
          </html>
          '''

          with open('_site/index.html', 'w') as f:
              f.write(html)

          print("✓ Generated index page")
          PYTHON_SCRIPT
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_URL: ${{ github.event.repository.html_url }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
