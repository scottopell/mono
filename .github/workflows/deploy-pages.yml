name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Copy static sites
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import os
          import shutil

          with open('.github/pages.yml', 'r') as f:
              config = yaml.safe_load(f)

          os.makedirs('_site', exist_ok=True)

          sites = config.get('sites', [])
          print(f"Found {len(sites)} sites to deploy")

          for site in sites:
              name = site['name']
              path = site['path']
              desc = site.get('description', '')

              print(f"Processing: {name}")

              if not os.path.isdir(path):
                  print(f"Warning: {path} not found, skipping")
                  continue

              # Copy static files
              dest = f"_site/{name}"
              if os.path.exists(dest):
                  shutil.rmtree(dest)
              shutil.copytree(path, dest)
              print(f"✓ Copied static site: {name}")
          PYTHON_SCRIPT

      - name: Generate index page
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import os

          with open('.github/pages.yml', 'r') as f:
              config = yaml.safe_load(f)

          title = config.get('index', {}).get('title', 'My Projects')
          description = config.get('index', {}).get('description', '')
          sites = config.get('sites', [])
          repo_name = os.environ.get('REPO_NAME', '')

          html = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{title}</title>
            <style>
              body {{
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 800px;
                margin: 50px auto;
                padding: 20px;
                line-height: 1.6;
              }}
              h1 {{ color: #333; }}
              .description {{ color: #666; margin-bottom: 30px; }}
              .projects {{ list-style: none; padding: 0; }}
              .projects li {{
                margin: 15px 0;
                padding: 15px;
                border: 1px solid #ddd;
                border-radius: 5px;
              }}
              .projects a {{
                font-size: 1.2em;
                color: #0366d6;
                text-decoration: none;
              }}
              .projects a:hover {{ text-decoration: underline; }}
              .project-desc {{ color: #666; margin-top: 5px; }}
            </style>
          </head>
          <body>
            <h1>{title}</h1>
            <p class="description">{description}</p>
            <ul class="projects">
          '''

          for site in sites:
              name = site['name']
              desc = site.get('description', '')
              html += f'''      <li>
                <a href="/{repo_name}/{name}/">{name}</a>
                <div class="project-desc">{desc}</div>
              </li>
          '''

          html += '''    </ul>
          </body>
          </html>
          '''

          with open('_site/index.html', 'w') as f:
              f.write(html)

          print("✓ Generated index page")
          PYTHON_SCRIPT
        env:
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
