# GitHub Pages deployment configuration
# Add new projects here - no need to modify the workflow

# Optional: root index page settings
index:
  title: "My Projects"
  description: "Collection of web applications"

# List of static sites to deploy
sites:
  - name: coffee-timer
    path: CoffeeTimer
    description: "Pour over coffee timer"
    # No build needed - static files only

  - name: path-of-erosion
    path: PathOfErosion
    description: "Zen tile-placement puzzle game"
    build:
      - "npm ci"
      - "npm run build"

  - name: bubble-sort-visualizer
    path: bubble-sort-visualizer
    description: "Bubble sort visualization with color-tagged elements and metrics tracking"

  # Add more static sites here:
  # - name: another-app
  #   path: another-app
  #   description: "Description of another app"
  #   build:  # Optional - only if build needed
  #     - "npm install"
  #     - "npm run build"
